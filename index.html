<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chung kết World Cup</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🏆 CHUNG KẾT</h1>

<div class="teams">

<div class="team">
<div class="flag">🇪🇸</div>
<h2>TÂY BAN NHA</h2>
</div>

<div class="vs">VS</div>

<div class="team">
<div class="flag">🇦🇷</div>
<h2>ARGENTINA</h2>
</div>

</div>

<div class="playerBox">

<p>NGƯỜI ĐANG QUAY</p>

<h2 id="playerName"></h2>

</div>

<div class="wheel">

<div id="wheel">
🎡
</div>

</div>

<button id="spin">
🎯 QUAY CHIA ĐỘI
</button>

<div class="result">

<div class="board">

<h3>🇪🇸 Tây Ban Nha</h3>

<ul id="spain"></ul>

</div>

<div class="board">

<h3>🇦🇷 Argentina</h3>

<ul id="argentina"></ul>

</div>

</div>

<button id="reset">

🔄 CHƠI LẠI

</button>

</div>

<script src="script.js"></script>

</body>
</html>
